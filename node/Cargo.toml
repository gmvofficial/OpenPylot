[package]
name = "gmv-agent-node-bindings"
version = "0.2.0"
edition = "2021"
description = "Node.js bindings for GMV Agent — A Rust-powered personal AI assistant"
license = "MIT"
repository = "https://github.com/GMV-AI/gmv-agent"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "2", features = ["async", "napi6"] }
napi-derive = "2"
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"

[build-dependencies]
napi-build = "2"
