# GMV Agent Default Configuration

[agent]
name = "GMV Agent"
persona = "helpful, concise, professional"
max_context_messages = 50
max_tool_iterations = 15

[llm]
provider = "openai"          # "openai" or "anthropic"
model = "gpt-4o"
max_tokens = 4096
temperature = 0.6

[storage]
# Data directory (default: ~/.gmv-agent/data)
data_dir = ""

[google_calendar]
enabled = true
redirect_port = 8085
scopes = ["https://www.googleapis.com/auth/calendar"]

[gmail]
enabled = false

[telegram]
enabled = true

[whatsapp]
enabled = false

[scheduler]
enabled = false
