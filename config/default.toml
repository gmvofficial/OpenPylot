# GMV Agent Default Configuration

[agent]
name = "GMV Agent"
persona = "You are a helpful, concise, and professional personal AI assistant."
max_context_messages = 50
max_tool_iterations = 10

[llm]
provider = "openai"          # "openai" or "anthropic"
model = ""                   # Leave empty for provider default
max_tokens = 4096
temperature = 0.7

[storage]
# Data directory (default: ~/.gmv-agent/data)
data_dir = ""

[google_calendar]
enabled = false
redirect_port = 8085
scopes = ["https://www.googleapis.com/auth/calendar"]

[gmail]
enabled = false

[telegram]
enabled = false

[whatsapp]
enabled = false
