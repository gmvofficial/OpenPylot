# Docker Compose for OpenPylot
#
# Usage:
#   docker compose up -d
#
# Secrets are passed via environment variables.
# Create a .env file with your API keys:
#   OPENAI_API_KEY=sk-...
#   TELEGRAM_BOT_TOKEN=...
#   TELEGRAM_CHAT_ID=...

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: pylot-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334

  pylot:
    build: .
    image: ghcr.io/openpylot/pylot:latest
    container_name: pylot
    restart: unless-stopped
    depends_on:
      - qdrant
    ports:
      - "8443:8443"  # Webhook server
    volumes:
      - pylot-data:/home/pylot/.pylot/data
      - pylot-logs:/home/pylot/.pylot/logs
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - QDRANT_URL=http://qdrant:6334
      - RUST_LOG=${RUST_LOG:-info}

volumes:
  pylot-data:
  pylot-logs:
  qdrant-data:
