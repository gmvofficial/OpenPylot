name: Release Binaries (GitHub)

# Builds the `pylot` CLI binary for Linux and macOS (x86_64 + aarch64) and
# attaches the tarballs to the GitHub Release. These are the prebuilt archives
# that install.sh and the Homebrew formula download, so users get instant
# installs instead of compiling from source.
#
# How to release:
#   1. Bump `version` in Cargo.toml.
#   2. Tag and push:  git tag v0.1.0 && git push origin v0.1.0
#      (the GitHub Release for that tag is created/updated automatically).
#   3. After the run, update Formula/openpylot.rb with the printed sha256 sums
#      (also written to the job summary).
#
# You can also run it manually (Actions tab → this workflow → Run workflow) to
# build the archives without attaching them to a release.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - runner: macos-13
            target: x86_64-apple-darwin
          - runner: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      # The web UI is embedded into the binary via rust-embed (see
      # src/frontend_assets.rs), so it must be built BEFORE `cargo build`.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }} --bin pylot

      - name: Package tarball
        id: package
        run: |
          set -euo pipefail
          archive="pylot-${{ matrix.target }}.tar.gz"
          tar -czf "$archive" -C "target/${{ matrix.target }}/release" pylot
          sha=$(shasum -a 256 "$archive" | awk '{print $1}')
          echo "archive=$archive" >> "$GITHUB_OUTPUT"
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"
          {
            echo "### ${{ matrix.target }}"
            echo '```'
            echo "$sha  $archive"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: pylot-${{ matrix.target }}
          path: ${{ steps.package.outputs.archive }}

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.archive }}
          fail_on_unmatched_files: true
